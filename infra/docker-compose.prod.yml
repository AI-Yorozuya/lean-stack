# 正式環境「整套」編排，跑在 terraform 開的那台 EC2 上。
#   postgres + redis + backend(gunicorn/uvicorn) + celery-worker + nginx(服務 admin 前端 + 反代 /api)
# 與 local compose「同構」：一樣的 redis + worker，一樣不開 eager（dev/prod parity）。
#
# 跑法（見 infra/DEPLOY.md / infra/scripts/deploy.sh）：
#   cp infra/.env.prod.example infra/.env.prod   # 填正式值
#   docker compose -f infra/docker-compose.prod.yml --env-file infra/.env.prod up -d --build
#
# 注意路徑：build context 都用相對 repo 根目錄的 ../apps/... ，
# 所以這個 compose 要從 repo 根目錄執行（-f infra/docker-compose.prod.yml）。
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - lean-stack-pg-data-prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    # 內部服務：不對外開 port，也不經 nginx；backend / worker 走內網連 redis。
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

  backend:
    build:
      context: ../apps/lean-backend
    env_file:
      - .env.prod
    # 不對外開 port：只在 compose 內網讓 nginx 連到 backend:8000。
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  # 背景 worker：重用 backend image，跑 celery worker（與 local 同構）。
  celery-worker:
    build:
      context: ../apps/lean-backend
    command: uv run celery -A core worker -l info
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      # 443 先預留；上 TLS 時再掛憑證 + 解開 nginx.conf 的 https server block。
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # admin 前端的 build 產物（vite build 後的 dist/），用唯讀掛進來給 nginx 服務。
      - ../apps/lean-admin/dist:/usr/share/nginx/lean-admin:ro
    depends_on:
      - backend
    restart: always

volumes:
  lean-stack-pg-data-prod:
