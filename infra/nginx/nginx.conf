# nginx：服務 admin 前端 static build + 反代 /api → backend:8000。
#
# upstream：compose 內網用 service 名 backend 連得到。
upstream backend {
    server backend:8000;
}

# 媒體檔（上傳）：prod 用 S3（USE_S3=True），物件由 S3 直接服務（或前面掛 CDN），
# 所以這裡的 nginx 「不」處理 /media。若改用本機檔案系統（USE_S3=False），
# 才需要在下面 server block 加一段 `location /media/ { alias /usr/share/.../media/; }`
# 並把 backend 的 media volume 掛進 nginx 容器。教學 prod 預設走 S3。

# ── 後台 lean-admin（預設站）──────────────────────────────────
server {
    listen 80 default_server;
    server_name your-domain.com;

    root /usr/share/nginx/lean-admin;
    index index.html;

    # SPA：找不到實體檔就回 index.html，交給前端 router。
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api 反代到後端。
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── HTTPS（上 TLS 時）─────────────────────────────────────────
# 拿到憑證後（例如 certbot / Cloudflare origin cert），把憑證掛進 nginx 容器，
# 複製上面的 server block 改 `listen 443 ssl;` 並加：
#   ssl_certificate     /etc/nginx/certs/fullchain.pem;
#   ssl_certificate_key /etc/nginx/certs/privkey.pem;
# 再把 80 改成 301 轉址到 https。教學骨架先只跑 80。
