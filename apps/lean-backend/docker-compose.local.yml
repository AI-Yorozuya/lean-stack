# 本機開發用：postgres + backend + redis + celery worker。
# 關鍵：本機就跑「真 redis + 真 worker」，跟 prod 同構（dev/prod parity）。
# 不開 celery eager 模式 —— eager 會藏掉只有真 worker 才會炸的 async bug
# （序列化、連線、worker 沒起來…），那正是「demo 會動、上 prod 垮」的牆。
# 跑法：docker compose -f apps/lean-backend/docker-compose.local.yml up --build
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lean_stack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # host 5433 → 容器 5432，避開本機可能已佔用的 5432。
      - "5433:5432"
    volumes:
      - lean-fullstack-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lean_stack"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # 不對外開 port（backend / worker 走 compose 內網用 service 名 redis 連）。
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
    # DATABASE_URL / CELERY_BROKER_URL 用 compose 的 service 名當 host。
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/lean_stack
      CELERY_BROKER_URL: redis://redis:6379/0
      DJANGO_SECRET_KEY: dev-only-insecure-change-me
      DEBUG: "True"
    ports:
      - "8000:8000"
    # 掛 source → 改 code 即時反映（配 entrypoint 的 uvicorn --reload）。
    # /app/.venv 用匿名 volume 保住容器內建好的 venv，不被 host 的蓋掉。
    volumes:
      - .:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 背景 worker：重用 backend 的 image，只是換成跑 celery worker。
  celery-worker:
    build:
      context: .
    command: uv run celery -A core worker -l info
    # 掛 source（celery 無自動 reload；改 worker code 後 docker compose restart celery-worker）。
    volumes:
      - .:/app
      - /app/.venv
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/lean_stack
      CELERY_BROKER_URL: redis://redis:6379/0
      DJANGO_SECRET_KEY: dev-only-insecure-change-me
      DEBUG: "True"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  lean-fullstack-pg-data:
